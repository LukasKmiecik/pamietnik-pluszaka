<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Książeczka naszej Maskotki</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="book">
    <div class="spread">
      <!-- LEWA STRONA -->
      <section class="page left-page">
        <div class="title-ribbon" id="bookTitle">Książeczka naszej Maskotki</div>

        <div class="photo-card">
          <img id="entryImage" src="images/placeholder.svg" alt="Zdjęcie maskotki" />
          <div class="photo-caption" id="entryCaption">Ładowanie...</div>
        </div>

        <div class="note-box">
          <p id="entryDescription">
            Trwa ładowanie opisu podróży...
          </p>

          <div class="fact-box">
            <div class="fact-icon" id="factIcon">🌍</div>
            <div class="fact-title" id="factTitle">Ciekawostka:</div>
            <div class="fact-text" id="factText">
              Trwa ładowanie ciekawostki...
            </div>
          </div>
        </div>

        <div class="entry-meta">
          <div class="meta-pill" id="entryCountry">Kraj</div>
          <div class="meta-pill" id="entryCity">Miasto</div>
          <div class="meta-pill" id="entryDate">Data</div>
        </div>
      </section>

      <!-- PRAWA STRONA -->
      <section class="page right-page">
        <div class="map-frame">
          <div class="map-overlay"></div>

          <div class="map-header">
            <div class="map-title">Mapa Podróży</div>
            <div class="map-subtitle" id="mapSubtitle">Rok przygód maskotki</div>
          </div>

          <div id="realMap" class="real-map" aria-label="Mapa podróży maskotki"></div>

          <div class="map-footer">
            <button class="nav-btn" id="prevBtn" type="button">← Wstecz</button>
            <button class="nav-btn primary" id="playBtn" type="button">Odtwórz podróż</button>
            <button class="nav-btn" id="nextBtn" type="button">Dalej →</button>
          </div>
        </div>
      </section>
    </div>

    <section class="timeline-panel">
      <div class="timeline-title">Oś czasu maskotki</div>
      <div class="timeline" id="timeline"></div>
    </section>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
